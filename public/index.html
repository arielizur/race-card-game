<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Race - Online multiplayer racing card game. Play with friends!">
  <meta name="theme-color" content="#0a0e27">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Race - המרוץ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Language Selector (always visible) -->
  <div id="lang-selector">
    <button class="lang-btn" data-lang="he" onclick="setLanguage('he')">🇮🇱 עב</button>
    <button class="lang-btn" data-lang="en" onclick="setLanguage('en')">🇬🇧 EN</button>
    <button class="lang-btn" data-lang="ru" onclick="setLanguage('ru')">🇷🇺 RU</button>
  </div>

  <!-- Stats Badge -->
  <div id="stats-badge" onclick="toggleStats()">
    <span id="stats-icon">📊</span>
  </div>
  <div id="stats-panel" class="hidden">
    <h3 data-i18n="stats"></h3>
    <div class="stat-row">
      <span data-i18n="games_played"></span>
      <span id="stat-games">0</span>
    </div>
    <div class="stat-row">
      <span data-i18n="wins"></span>
      <span id="stat-wins">0</span>
    </div>
    <div class="stat-row">
      <span data-i18n="win_rate"></span>
      <span id="stat-winrate">0%</span>
    </div>
  </div>

  <!-- LOBBY SCREEN -->
  <div id="lobby-screen" class="screen active">
    <div class="lobby-container">
      <div class="logo-section">
        <div class="logo-icon">🏎️</div>
        <h1 class="logo-title" data-i18n="app_title"></h1>
        <p class="logo-subtitle" data-i18n="app_subtitle"></p>
      </div>

      <!-- Name Input -->
      <div class="input-group">
        <label data-i18n="your_name"></label>
        <input type="text" id="player-name" data-i18n-placeholder="enter_name" maxlength="15" autocomplete="off">
      </div>

      <!-- Create / Join Buttons -->
      <div class="lobby-actions" id="lobby-actions-main">
        <button class="btn btn-primary btn-lg" id="btn-create" onclick="createRoom()">
          <span class="btn-icon">🏁</span>
          <span data-i18n="create_room"></span>
        </button>
        <div class="divider">
          <span>OR</span>
        </div>
        <div class="join-group">
          <input type="text" id="room-code-input" data-i18n-placeholder="enter_code" maxlength="4" autocomplete="off"
                 style="text-transform: uppercase;">
          <button class="btn btn-secondary" id="btn-join" onclick="joinRoom()">
            <span data-i18n="join_room"></span>
          </button>
        </div>
      </div>

      <!-- Waiting Room (after creating/joining) -->
      <div id="waiting-room" class="hidden">
        <div class="room-code-display">
          <span data-i18n="share_code"></span>
          <div class="code-box" id="display-room-code"></div>
          <button class="btn btn-small" onclick="copyRoomCode()" id="btn-copy">
            <span data-i18n="copy_code"></span>
          </button>
        </div>
        <div class="players-list">
          <h3 data-i18n="players_in_room"></h3>
          <ul id="players-list"></ul>
        </div>
        <button class="btn btn-primary btn-lg" id="btn-start" onclick="startGame()" style="display:none;">
          <span class="btn-icon">🚀</span>
          <span data-i18n="start_game"></span>
        </button>
        <p class="hint" id="host-hint" style="display:none;" data-i18n="you_are_host"></p>
        <p class="hint" id="waiting-hint" data-i18n="waiting_players"></p>
      </div>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" class="screen">
    <!-- Top Bar -->
    <div id="game-topbar">
      <div class="topbar-left">
        <span id="room-code-badge"></span>
        <span id="deck-count-badge">
          <span class="deck-icon">🃏</span>
          <span id="deck-count">0</span>
        </span>
      </div>
      <div class="topbar-center">
        <span id="turn-indicator" class="pulse"></span>
      </div>
      <div class="topbar-right">
        <span id="my-distance-badge">
          <span class="dist-value" id="my-distance">0</span>
          <span class="dist-label">/1000</span>
          <span data-i18n="km"></span>
        </span>
      </div>
    </div>

    <!-- Progress Bar -->
    <div id="progress-bar-container">
      <div id="progress-bar" style="width: 0%"></div>
      <div id="progress-text">0 / 1000</div>
    </div>

    <!-- Opponents Area -->
    <div id="opponents-area"></div>

    <!-- My Board -->
    <div id="my-board">
      <div class="board-section" id="my-battle-area">
        <span class="board-label" data-i18n="battle"></span>
        <div class="board-cards" id="my-battle-cards"></div>
      </div>
      <div class="board-section" id="my-speed-area">
        <span class="board-label" data-i18n="speed"></span>
        <div class="board-cards" id="my-speed-cards"></div>
      </div>
      <div class="board-section" id="my-safety-area">
        <span class="board-label" data-i18n="safety_zone"></span>
        <div class="board-cards" id="my-safety-cards"></div>
      </div>
      <div class="board-section" id="my-status-area">
        <span id="my-status-text"></span>
      </div>
    </div>

    <!-- Action Bar -->
    <div id="action-bar" class="hidden">
      <button class="btn btn-action" id="btn-draw" onclick="drawCard()">
        <span data-i18n="draw_card"></span> 🃏
      </button>
    </div>

    <!-- Hand Area -->
    <div id="hand-area">
      <div id="hand-cards"></div>
    </div>

    <!-- Card Action Popup -->
    <div id="card-action-popup" class="hidden">
      <div class="popup-content">
        <div id="popup-card-preview"></div>
        <div id="popup-actions">
          <button class="btn btn-primary" id="btn-play-card" onclick="playSelectedCard()">
            <span data-i18n="play"></span>
          </button>
          <button class="btn btn-danger" id="btn-discard-card" onclick="discardSelectedCard()">
            <span data-i18n="discard"></span>
          </button>
          <button class="btn btn-ghost" onclick="closeCardPopup()">
            <span data-i18n="cancel"></span>
          </button>
        </div>
        <!-- Target selector for hazard cards -->
        <div id="target-selector" class="hidden">
          <h4 data-i18n="select_target"></h4>
          <div id="target-buttons"></div>
        </div>
      </div>
    </div>

    <!-- Coup Fourré Popup -->
    <div id="coup-fourre-popup" class="hidden">
      <div class="popup-content coup-fourre-content">
        <h2 data-i18n="coup_fourre"></h2>
        <p data-i18n="coup_fourre_prompt"></p>
        <div class="popup-actions">
          <button class="btn btn-primary btn-glow" id="btn-coup-fourre-yes" onclick="playCoupFourre()">
            <span data-i18n="coup_fourre_yes"></span>
          </button>
          <button class="btn btn-ghost" onclick="passCoupFourre()">
            <span data-i18n="coup_fourre_no"></span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- GAME OVER SCREEN -->
  <div id="gameover-screen" class="screen">
    <div class="gameover-container">
      <div id="gameover-trophy">🏆</div>
      <h1 id="gameover-title"></h1>
      <h2 id="gameover-winner"></h2>
      <div id="gameover-scores"></div>
      <div class="gameover-actions">
        <button class="btn btn-primary btn-lg" onclick="playAgain()">
          <span data-i18n="play_again"></span>
        </button>
      </div>
    </div>
  </div>

  <!-- Toast notifications -->
  <div id="toast-container"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
